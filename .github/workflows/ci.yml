name: CI

# Build + test on Linux and Windows. crymble-ui vendors SFML 3 / CSFML 3 — Linux shared
# libs under lib/crymble-ui/locallib/{sfml3,csfml3}/lib/linux/, Windows static libs under the
# sibling .../lib/win32/ — so we do NOT build SFML here; `shards install` pulls them and
# setup.sh / setup.bat wire the linker paths. The GUI specs run headless (CrymbleUI
# TestRenderer), so no display / xvfb is needed.
#
# The two-group spec split (non-GUI, then GUI) avoids a Fiber/event-loop crash when both run
# in a single `crystal spec` invocation.
#
# The Windows release .exe (with the embedded icon) is still produced via tools/win-build.bat
# and attached to a GitHub Release; this CI only validates that the build + tests pass.
# NOTE: the Windows job is a best-effort first cut — expect a debug pass on the real runner
# (MSVC + Crystal-on-Windows toolchain specifics).

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: "1.20.0"

      - name: Install SFML 3 build + runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev libopenal1 libfreetype6 \
            libx11-6 libxrandr2 libxcursor1 libxi6 libudev1 \
            libvorbisfile3 libflac12

      - name: shards install
        run: shards install

      - name: Build
        run: |
          source setup.sh
          shards build embrace

      - name: Specs (core / data layer)
        run: |
          source setup.sh
          crystal spec spec/*.cr spec/table/*.cr

      - name: Specs (GUI)
        run: |
          source setup.sh
          crystal spec spec/gui/*.cr

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: "1.20.0"

      - uses: ilammy/msvc-dev-cmd@v1

      - name: shards install
        run: shards install

      # crymble-ui's setup.bat prepends the vendored win32 static libs to LIB/INCLUDE;
      # persist them to the job env so the following bash steps (which glob spec/*.cr) see them.
      - name: Wire vendored SFML/CSFML (from setup.bat)
        shell: cmd
        run: |
          call setup.bat
          echo LIB=%LIB%>> %GITHUB_ENV%
          echo INCLUDE=%INCLUDE%>> %GITHUB_ENV%
          echo CSFML_INCLUDE_DIR=%CSFML_INCLUDE_DIR%>> %GITHUB_ENV%

      - name: Build
        shell: bash
        run: shards build embrace

      - name: Specs (core / data layer)
        shell: bash
        run: crystal spec spec/*.cr spec/table/*.cr

      - name: Specs (GUI)
        shell: bash
        run: crystal spec spec/gui/*.cr
