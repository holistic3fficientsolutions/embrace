name: Release

# Builds the downloadable binaries and attaches them to the GitHub Release whenever a
# version tag (v*) is pushed. publish.sh pushes such a tag, so a release is cut
# automatically; it can also be run manually for an existing tag (workflow_dispatch).
#
#   Linux   -> embrace-linux-x86_64.AppImage
#              (portable AppImage: the binary + its full non-system dependency closure
#               and a multi-size icon, assembled by tools/build-appimage.sh via
#               linuxdeploy. Host libs like libGL/libX11 are intentionally NOT bundled,
#               per the AppImage excludelist. Needs libfuse2 at runtime, or run with
#               --appimage-extract-and-run.)
#   Windows -> embrace-windows-x64.exe
#              (static, self-contained, embedded icon; built via tools/win-build.bat)
#
# Both jobs delegate to a committed, locally-runnable build script (build-appimage.sh /
# win-build.bat) — the workflow just calls it. Resources (font / logo / runtime window
# icon) are compiled into the binary (see constants.cr); the AppImage additionally
# carries the desktop-integration icon (resources/embrace-logo.ico → hicolor PNGs).
#
# The asset names are stable and version-less so the website can link
# /releases/latest/download/<asset>; the version stays visible in the About dialog and
# the GitHub Release title.

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. v2.0.4)"
        required: true

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: "1.20.0"

      - name: Install build + packaging dependencies
        run: |
          sudo apt-get update
          # SFML 3 build/runtime libs (linking + ldd resolution) plus the AppImage
          # toolchain's helpers (icon extraction, ELF patching, desktop validation).
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev libopenal1 libfreetype6 \
            libx11-6 libxrandr2 libxcursor1 libxi6 libudev1 \
            libvorbisfile3 libflac12 \
            imagemagick patchelf desktop-file-utils file

      - name: shards install
        run: shards install

      # Mirrors the Windows job (which just calls win-build.bat): build-appimage.sh
      # sources setup.sh, builds the release binary, bundles the non-system dependency
      # closure + multi-size icon via linuxdeploy, and writes the AppImage under temp/.
      - name: Build AppImage
        run: bash tools/build-appimage.sh

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: temp/embrace-linux-x86_64.AppImage
          fail_on_unmatched_files: true

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: "1.20.0"

      - uses: ilammy/msvc-dev-cmd@v1

      - name: shards install
        run: shards install

      # win-build.bat calls setup.bat, compiles the icon resource and links the static
      # SFML/CSFML libs into a self-contained bin\embrace.exe.
      - name: Build release .exe (embedded icon)
        shell: cmd
        run: call tools\win-build.bat

      - name: Name the asset
        shell: bash
        run: |
          set -euo pipefail
          # Stable, version-less name so the website can link
          # /releases/latest/download/embrace-windows-x64.exe (auto-tracks newest 2.0.x).
          cp bin/embrace.exe "embrace-windows-x64.exe"
          echo "ASSET=embrace-windows-x64.exe" >> "$GITHUB_ENV"

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
