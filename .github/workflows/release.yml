name: Release

# Builds the downloadable binaries and attaches them to the GitHub Release whenever a
# version tag (v*) is pushed. publish.sh pushes such a tag, so a release is cut
# automatically; it can also be run manually for an existing tag (workflow_dispatch).
#
#   Linux   -> embrace-<tag>-linux-x86_64.tar.gz
#              (release binary + bundled SFML/CSFML .so + a launcher that sets
#               LD_LIBRARY_PATH; common system libs like libGL/libopenal must be present)
#   Windows -> embrace-<tag>-windows-x64.exe
#              (static, self-contained, embedded icon; built via tools/win-build.bat)
#
# Resources (font / logo / icon) are compiled into the binary (see constants.cr), so no
# resources/ directory ships alongside the executables.
#
# NOTE: best-effort first cut — validate on the first tag and adjust (the Linux
# packaging in particular can only be exercised on a real runner).

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. v2.0.4)"
        required: true

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: "1.20.0"

      - name: Install SFML 3 build + runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev libopenal1 libfreetype6 \
            libx11-6 libxrandr2 libxcursor1 libxi6 libudev1 \
            libvorbisfile3 libflac12

      - name: shards install
        run: shards install

      - name: Build (release)
        run: |
          source setup.sh
          shards build embrace --release --no-debug

      - name: Package portable tarball
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          DIST="embrace-${TAG}-linux-x86_64"
          mkdir -p "$DIST/bin" "$DIST/lib"
          cp bin/embrace "$DIST/bin/embrace"
          cp -P lib/crymble-ui/locallib/sfml3/lib/linux/*.so*  "$DIST/lib/"
          cp -P lib/crymble-ui/locallib/csfml3/lib/linux/*.so* "$DIST/lib/"
          cat > "$DIST/embrace" <<'LAUNCH'
          #!/usr/bin/env bash
          # Portable launcher: load the bundled SFML/CSFML libs next to this binary.
          HERE="$(cd "$(dirname "$(readlink -f "$0")")" && pwd)"
          export LD_LIBRARY_PATH="$HERE/lib:${LD_LIBRARY_PATH:-}"
          exec "$HERE/bin/embrace" "$@"
          LAUNCH
          chmod +x "$DIST/embrace" "$DIST/bin/embrace"
          tar czf "$DIST.tar.gz" "$DIST"
          echo "ASSET=$DIST.tar.gz" >> "$GITHUB_ENV"

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: "1.20.0"

      - uses: ilammy/msvc-dev-cmd@v1

      - name: shards install
        run: shards install

      # win-build.bat calls setup.bat, compiles the icon resource and links the static
      # SFML/CSFML libs into a self-contained bin\embrace.exe.
      - name: Build release .exe (embedded icon)
        shell: cmd
        run: call tools\win-build.bat

      - name: Name the asset
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          cp bin/embrace.exe "embrace-${TAG}-windows-x64.exe"
          echo "ASSET=embrace-${TAG}-windows-x64.exe" >> "$GITHUB_ENV"

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
